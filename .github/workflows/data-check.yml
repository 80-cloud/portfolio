name: Data Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: データ整合性チェック
        run: node scripts/check-data.mjs
